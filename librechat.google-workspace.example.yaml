# Copy to LibreChat root as librechat.yaml (or merge mcpServers into existing config)
version: 1.3.5
cache: true

interface:
  customWelcome: 'Google Workspace assistant ready.'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  mcpServers:
    use: true

# Required: Google Workspace MCP (uses GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET from .env)
mcpServers:
  google_workspace:
    type: stdio
    command: python3  # use 'python' on Windows if python3 is not in PATH
    args:
      - "scripts/mcp_server.py"
    env:
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_MCP_REDIRECT_URI: "http://localhost:8080/"
    timeout: 60000

# Optional: OpenRouter (uses OPENROUTER_KEY from .env). Remove if using Gemini only.
endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        x-librechat-body-parentmessageid: '{{LIBRECHAT_BODY_PARENTMESSAGEID}}'
      models:
        default:
          - 'meta-llama/llama-3-70b-instruct'
        fetch: true
      titleConvo: true
      titleModel: 'meta-llama/llama-3-70b-instruct'
      dropParams:
        - 'stop'
      modelDisplayLabel: 'OpenRouter'
