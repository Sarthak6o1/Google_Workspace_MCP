# Copy to LibreChat root as librechat.yaml (or merge mcpServers into existing config)
version: 1.3.5
cache: true

interface:
  customWelcome: 'Google Workspace assistant ready.'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  fileCitations: true
  mcpServers:
    use: true

# Required: Google Workspace MCP (uses GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET from .env)
mcpServers:
  google_workspace:
    type: stdio
    command: python3  # use 'python' on Windows if python3 is not in PATH
    args:
      - "scripts/mcp_server.py"
    env:
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_MCP_REDIRECT_URI: "http://localhost:8080/"
    timeout: 60000  # MCP server timeout in ms; increase if tools take longer

# --- LLM Endpoints ---
# Built-in (openAI, anthropic, google): set env vars in .env, no YAML needed.
# Azure OpenAI: requires YAML config below (groups with instanceName, deploymentName).
# Custom (OpenRouter, Groq, etc.): uncomment entries below.
# See: https://docs.librechat.ai/configuration/librechat_yaml/ai_endpoints

